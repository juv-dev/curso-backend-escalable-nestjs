name: Trigger Delete Branch

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Repository name (owner/repo)'
        required: true
      branch:
        description: 'Branch name to delete'
        required: true

jobs:
  trigger-delete:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar delete-branch
        uses: actions/github-script@v6
        with:
          script: |
            const [owner, repo] = '${{ github.event.inputs.repo }}'.split('/');
            const octokit = github.getOctokit('${{ secrets.REPO_ACCESS_TOKEN }}');
            
            await octokit.rest.repos.createDispatchEvent({
              owner: owner,
              repo: repo,
              event_type: 'delete-branch',
              client_payload: {
                branch: '${{ github.event.inputs.branch }}'
              }
            });