name: Call Tag on merge

on:
  pull_request:
    types: [closed]  # Se activa cuando el PR se cierra (con o sin merge)
    branches: [main]  # Solo para PRs que apuntan a la rama main

permissions:
  contents: write

jobs:
  tag-version:
    # Esta condición es CRÍTICA: solo continúa si el PR se cerró CON MERGE
    if: github.event.pull_request.merged == true
    
    uses: juv-dev/workflows-frontend/.github/workflows/create-tag.yml@main
    with:
      ref: ${{ github.event.pull_request.merge_commit_sha }}
    secrets:
      repo_token: ${{ secrets.GITHUB_TOKEN }}