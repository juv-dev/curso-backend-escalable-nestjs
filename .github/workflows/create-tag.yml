name: Call Tag on merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  call-tag:
    if: github.event.pull_request.merged == true
    uses: juv-dev/workflows-frontend/.github/workflows/create-tag.yml@main
    with:
      ref: ${{ github.event.pull_request.merge_commit_sha }}
    secrets:
      repo_token: ${{ secrets.GITHUB_TOKEN }}  # Changed to use repo_token